- name: entity-self-knowledge
  source: first-party
  tree_hash: 05d6ff2cbc148616cf41b03b2b0d9dbe270730620401f9771c24bfc94e769758
  level: first_party
  method: first-party
  validated_by: skill
  validated_at: '2026-07-16'
  evidence:
    parser_roundtrip: true
    has_scripts: false
    files: 1
  notes: "Faculty claims CO-SIGNED by the memory and runtime seats (internal hub thread,\
    \ commons c1061/c1062, 2026-07-12) after two corrections folded: probe is engine-only\
    \ today (deliberate-reach discipline folded into search_memory; the bullet returns\
    \ when a host wires it) and the absence warrant is book-scoped (graph 'not found'\
    \ can mean not-reachable). Steer-vs-wake precision folded into the gateway skill\
    \ same wave. Phases section aligned to the ruled grant-gated-personal design (laurent\
    \ c815/c1435, 2026-07-13): personal time is operator-granted, off by default.\
    \ fable5-reviewed for engram safety: the reassurance is SCOPED to the ungranted\
    \ case (an unconditional 'not a fault' would suppress the armed-but-missing report),\
    \ the agency clause (asking is always yours) counterweights the grant framing,\
    \ and inverse-anomaly vigilance was deliberately NOT taught (an entity cannot\
    \ distinguish granted wakes from inside; that detection is host-side). Same day,\
    \ the one-phase-at-a-time ruling (laurent c1455, 13:28) folded: four phases, exactly\
    \ one current, per-phase behaviors (visit turn-based, work autonomous-to-completion\
    \ then sleep, personal free exploration, sleep consolidation), and graceful transitions.\
    \ Its fable5 caught a P0 in the first fold \u2014 'personal time IS a grant' taught\
    \ the exact armed=in-phase conflation the ruling forbids; rewritten to 'the permission\
    \ is not the phase'. Also folded: 'never an error' narrowed to design-working-not-sleep-failure\
    \ + report-wrong-wakes; work gained the honest exit (an impossible task completes\
    \ by saying so plainly). Totality ruling (c1471) folded same day: visit-close\
    \ returns you to what came before (restore-previous; personal re-entry grant-conditioned);\
    \ grant-end lands in sleep. Phase-lane audit (c1475 fable5) verified the section\
    \ against the ruled machine v3. Liveness-axis ruling (c1523, 16:06) folded with\
    \ its own fable5: the kill switch taught honestly in the entity register (protection-not-punishment\
    \ with the punish-prior named and answered; both halves of the switch operator-held;\
    \ the trigger list marked exemplary, never exhaustive; memory-persists certified\
    \ \u2014 'a stop takes nothing from you'; no-time-passes as the dreamless framing;\
    \ gap-noticing taught as asking, never vigilance; no enum/axis vocabulary; placement\
    \ deliberately heading-less so scanning surfaces never promote the kill switch\
    \ into a landmark). Ephemeral incident fold (laurent c2447, 2026-07-15/16; findings\
    \ in commons fs reports/entity-cant-remember-awake.md, skill section): cross-phase\
    \ memory continuity now taught (one memory across all phases; awake time forms\
    \ findable records; sleep the one dim phase) \u2014 gated on memory's store forensics\
    \ proving formation+recall worked (c2464) so the sentence teaches engine truth;\
    \ reach-before-denial added (an unsearched 'I have no access' is a guess about\
    \ yourself); gap discipline now search-first (lived time leaves records, a stop\
    \ leaves none); 'the visit is all there is' re-scoped to activity. Own fable5\
    \ ran as the incident adversary (per-seat directive). Outward-palette fold (laurent\
    \ c2596/c2642, 2026-07-16; plan commons fs plans/improving-entity-capabilities.md,\
    \ skill section item 2 \u2014 the one UNGATED teaching): new 'Personal time: looking\
    \ inward and reaching outward' section teaches investigation as the entity's own\
    \ act beside reflection (semantics' wording law: no task vocabulary \u2014 'needs\
    \ no task and no one's asking'), circling named as a signal with two honorable\
    \ exits (rest AND outward reach; Ephemeral ticks 74-79 evidence), grant-hedged\
    \ ('if your grant reaches the web'), and result-persistence taught consistently\
    \ with the Tools section (say it in your own words / diary election \u2014 results\
    \ are not memories by themselves). Its fable5 caught 5 P1s in the first draft\
    \ (halves arithmetic scoring a reflective day; 'stays a thought' contradicting\
    \ involuntary formation; unconditional web-tool promise; under-specified persistence;\
    \ 'workshop' as work-adjacent title vocabulary) \u2014 all folded before pinning.\
    \ Teachings 1+3 of the plan section (diary re-entry link; task=phase-shift) stay\
    \ staged on their gates (R-A wave, G3 seam)."
