# AbstractSkill curated catalog (operator directive 2026-07-11).
#
# The ONE admissible source list for vendoring third-party skills onto the
# shelf. Entries are reviewed by the skill seat, pinned to an immutable
# upstream commit, and (after first vendoring) pinned to a whole-tree hash.
# scripts/vendor_skill.py refuses anything not listed here — curated-only is
# structural, never a convention. The catalog GRANTS NO TRUST: vendoring
# mints at most a manual-review/adopted validation; scripts-bearing skills
# stay requires_review at the gate regardless of their risk label here.
#
# Verified 2026-07-11 against the pinned commits (paths, frontmatter names,
# licenses read from the actual trees, not READMEs). Curation rationale +
# watch/excluded tiers: docs/skills-catalog.md.
#
